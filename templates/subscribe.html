<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Subscribe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container text-center mt-5">
    <h1>Upgrade to Pro Trading</h1>
    <p class="lead">Get unlimited access to automated trading tools.</p>
    
    <div class="card bg-secondary text-white mx-auto mt-4" style="max-width: 400px;">
        <div class="card-body">
            <h3>Pro Plan</h3>
            <h2 class="display-4">₹500<span class="fs-5">/mo</span></h2>
            <ul class="list-unstyled mt-3 mb-4">
                <li>✅ Unlimited Trades</li>
                <li>✅ Advanced Analytics</li>
                <li>✅ Priority Support</li>
            </ul>
            <button id="rzp-button1" class="btn btn-warning btn-lg w-100">Subscribe Now</button>
        </div>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
document.getElementById('rzp-button1').onclick = async function(e){
    e.preventDefault();

    // 1. Ask Backend to create a subscription ID
    const response = await fetch('/create-subscription', { method: 'POST' });
    const data = await response.json();

    if(data.error) {
        alert("Error creating subscription: " + data.error);
        return;
    }

    // 2. Open Razorpay Options
    var options = {
        "key": "{{ key_id }}", 
        "subscription_id": data.subscription_id, // The ID we just got
        "name": "Trading App Pro",
        "description": "Monthly Subscription",
        "handler": function (response){
            // 3. Verify Payment on Backend
            fetch('/payment-success', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    razorpay_payment_id: response.razorpay_payment_id,
                    razorpay_subscription_id: response.razorpay_subscription_id,
                    razorpay_signature: response.razorpay_signature
                })
            }).then(res => res.json())
              .then(data => {
                  if(data.success){
                      window.location.href = "/"; // Redirect to Dashboard
                  } else {
                      alert("Payment verification failed!");
                  }
              });
        },
        "prefill": {
            "name": "User Name", // You can pass Jinja2 variables here if you want
            "email": "user@example.com"
        },
        "theme": {
            "color": "#F37254"
        }
    };
    
    var rzp1 = new Razorpay(options);
    rzp1.open();
};
</script>

</body>
</html>
